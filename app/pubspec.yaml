name: checkin
description: Check-In — a simple, private way to keep up with friends.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  http_parser: ^4.0.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  native_exif: ^0.6.0      # read a picked photo's GPS (on-device)
  geocoding: ^3.0.0        # reverse-geocode lat/lng → "City, Country" (on-device)
  gal: ^2.3.0              # save a post's photo to the device gallery
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  flutter_contacts: ^2.1.0
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  intl: ^0.19.0
  firebase_core: ^3.8.0       # initialise Firebase from the native google-services config
  firebase_messaging: ^15.1.5 # FCM push: delivers to Android directly and iOS via APNs

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
