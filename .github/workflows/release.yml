name: Release

# Cuts a new version on every push to main: bumps the version from conventional
# commits, builds & publishes the server Docker image, builds the Flutter apps, creates
# a GitHub Release with the Android APK, and (when store secrets are present) deploys to
# the Play Store and App Store via fastlane.

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Gate the whole release on the same checks CI runs on PRs. ci.yml ignores main, so
  # without this a broken merge to main would publish + deploy untested. version (and
  # therefore every build/deploy job that needs it) only runs once these pass.
  test-server:
    name: Test server (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: server/go.sum
      - name: Check formatting (gofmt)
        run: test -z "$(gofmt -l .)" || { echo 'These files need gofmt:'; gofmt -l .; exit 1; }
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -race

  test-app:
    name: Test app (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Check formatting (dart format)
        run: dart format --output=none --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test

  version:
    name: Compute version
    needs: [test-server, test-app]
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      new_version: ${{ steps.tag.outputs.new_version }}
      changelog: ${{ steps.tag.outputs.changelog }}
      has_play: ${{ steps.secrets.outputs.has_play }}
      has_appstore: ${{ steps.secrets.outputs.has_appstore }}
      has_keystore: ${{ steps.secrets.outputs.has_keystore }}
      build_number: ${{ steps.build.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute build number
        id: build
        # Expression syntax has no arithmetic, so derive a single monotonic build number
        # (run_number * 100 + run_attempt) in the shell and share it via an output.
        run: echo "build_number=$(( ${{ github.run_number }} * 100 + ${{ github.run_attempt }} ))" >> "$GITHUB_OUTPUT"
      - name: Bump version and tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
      - name: Detect store secrets
        id: secrets
        env:
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          IOS_CERT: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "has_play=$([ -n "$PLAY_JSON" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_appstore=$([ -n "$IOS_CERT" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_keystore=$([ -n "$KEYSTORE" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  docker:
    name: Build & push server image
    needs: version
    if: needs.version.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/nc1107/check-in:latest
            ghcr.io/nc1107/check-in:${{ needs.version.outputs.new_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  android:
    name: Build Android
    needs: version
    if: needs.version.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Decode signing keystore
        if: needs.version.outputs.has_keystore == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > app/android/app/upload-keystore.jks
          printf '%s' "$KEY_PROPERTIES" > app/android/key.properties
      - working-directory: app
        run: |
          flutter pub get
          flutter build apk --release \
            --build-name=${{ needs.version.outputs.new_version }} \
            --build-number=${{ needs.version.outputs.build_number }}
          flutter build appbundle --release \
            --build-name=${{ needs.version.outputs.new_version }} \
            --build-number=${{ needs.version.outputs.build_number }}
      - uses: actions/upload-artifact@v4
        with:
          name: android
          retention-days: 7
          path: |
            app/build/app/outputs/flutter-apk/app-release.apk
            app/build/app/outputs/bundle/release/app-release.aab

  release:
    name: GitHub Release
    needs: [version, docker, android]
    if: needs.version.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android
          path: ./artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: ${{ needs.version.outputs.new_tag }}
          body: ${{ needs.version.outputs.changelog }}
          files: ./artifacts/**/*.apk

  # --- Store deploys (run only when the corresponding secrets are configured) ---

  play-store:
    name: Deploy to Play Store
    needs: [version, android]
    if: >
      needs.version.outputs.has_play == 'true' &&
      needs.version.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: app
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Decode signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > app/android/app/upload-keystore.jks
          printf '%s' "$KEY_PROPERTIES" > app/android/key.properties
      - name: Deploy (internal track)
        working-directory: app
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          VERSION: ${{ needs.version.outputs.new_version }}
          VERSION_CODE: ${{ needs.version.outputs.build_number }}
        run: bundle exec fastlane android internal

  app-store:
    name: Build & upload iOS to TestFlight
    needs: [version]
    if: >
      needs.version.outputs.has_appstore == 'true' &&
      needs.version.outputs.new_tag != ''
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Cache pub-cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.pub-cache
            app/.dart_tool
          key: ${{ runner.os }}-pubcache-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pubcache-
      - name: Cache CocoaPods
        uses: actions/cache@v6
        with:
          path: |
            app/ios/Pods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pods-
      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
      - name: Install CocoaPods
        run: gem install cocoapods
      - name: Set up code signing
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
            $(security cms -D -i "$PP_PATH"))
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
      - name: Set up App Store Connect API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
      - name: Build IPA
        working-directory: app
        run: |
          flutter pub get
          flutter build ipa --release \
            --build-name=${{ needs.version.outputs.new_version }} \
            --build-number=${{ needs.version.outputs.build_number }} \
            --export-options-plist=ios/ExportOptions.plist
      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          IPA=$(find app/build/ios -name "*.ipa" | head -1)
          xcrun altool --upload-app \
            -f "$IPA" -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --show-progress
