name: Release

# Cuts a new version on every push to main: bumps the version from conventional
# commits, builds & publishes the server Docker image, builds the Flutter apps, creates
# a GitHub Release with the Android APK, and (when store secrets are present) deploys to
# the Play Store and App Store via fastlane.

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      new_version: ${{ steps.tag.outputs.new_version }}
      changelog: ${{ steps.tag.outputs.changelog }}
      has_play: ${{ steps.secrets.outputs.has_play }}
      has_appstore: ${{ steps.secrets.outputs.has_appstore }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Bump version and tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
      - name: Detect store secrets
        id: secrets
        env:
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          echo "has_play=$([ -n "$PLAY_JSON" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_appstore=$([ -n "$ASC_KEY" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  docker:
    name: Build & push server image
    needs: version
    if: needs.version.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/nc1107/check-in:latest
            ghcr.io/nc1107/check-in:${{ needs.version.outputs.new_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  android:
    name: Build Android
    needs: version
    if: needs.version.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Decode signing keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > app/android/app/upload-keystore.jks
          printf '%s' "$KEY_PROPERTIES" > app/android/key.properties
      - working-directory: app
        run: |
          flutter pub get
          flutter build apk --release --build-name=${{ needs.version.outputs.new_version }}
          flutter build appbundle --release --build-name=${{ needs.version.outputs.new_version }}
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            app/build/app/outputs/flutter-apk/app-release.apk
            app/build/app/outputs/bundle/release/app-release.aab

  release:
    name: GitHub Release
    needs: [version, docker, android]
    if: needs.version.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android
          path: ./artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: ${{ needs.version.outputs.new_tag }}
          body: ${{ needs.version.outputs.changelog }}
          files: ./artifacts/**/*.apk

  # --- Store deploys (run only when the corresponding secrets are configured) ---

  play-store:
    name: Deploy to Play Store
    needs: [version, android]
    if: needs.version.outputs.has_play == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: app
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Deploy (internal track)
        working-directory: app
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
          VERSION: ${{ needs.version.outputs.new_version }}
        run: bundle exec fastlane android internal

  app-store:
    name: Deploy to App Store
    needs: [version]
    if: needs.version.outputs.has_appstore == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: app
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Deploy (TestFlight)
        working-directory: app
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          VERSION: ${{ needs.version.outputs.new_version }}
        run: bundle exec fastlane ios beta
