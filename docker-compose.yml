# Check-In self-hosted stack: PostgreSQL + API server + Caddy (auto-HTTPS).
#
# Quick start:
#   1. cp .env.example .env  and edit the values (especially CHECKIN_DOMAIN + POSTGRES_PASSWORD)
#   2. docker compose up -d
#
# Caddy automatically obtains a Let's Encrypt certificate for CHECKIN_DOMAIN
# (e.g. check-in.npc-server.top). Point that subdomain's DNS A record at this host.

networks:
  # caddy reaches server but has no route to db.
  frontend:
  # server reaches db but is not exposed directly to caddy's external net.
  backend:

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-checkin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-checkin}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-checkin}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  server:
    # Pull the released image, or build locally with `docker compose build`.
    image: ${CHECKIN_IMAGE:-ghcr.io/nc1107/check-in:latest}
    build: ./server
    restart: unless-stopped
    networks:
      - frontend
      - backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      CHECKIN_HTTP_ADDR: ":8080"
      CHECKIN_DATABASE_URL: "postgres://${POSTGRES_USER:-checkin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-checkin}?sslmode=disable"
      CHECKIN_MEDIA_DIR: "/data/media"
      CHECKIN_SERVER_NAME: ${CHECKIN_SERVER_NAME:-Check-In}
      # Optional debug web view at /debug?token=... — unset/empty disables it.
      CHECKIN_DEBUG_TOKEN: ${CHECKIN_DEBUG_TOKEN:-}
      # Push notifications (optional): in-container path to the Firebase service-account
      # JSON. Leave empty to disable push entirely. See CHECKIN_FCM_CREDENTIALS_HOST below.
      CHECKIN_FCM_CREDENTIALS_FILE: ${CHECKIN_FCM_CREDENTIALS_FILE:-}
    volumes:
      - media_data:/data/media
      # Mounts your Firebase service-account JSON when CHECKIN_FCM_CREDENTIALS_HOST points
      # at it; defaults to a harmless no-op so push stays optional for other self-hosters.
      - ${CHECKIN_FCM_CREDENTIALS_HOST:-/dev/null}:/run/secrets/fcm-service-account.json:ro
    deploy:
      resources:
        limits:
          memory: 256M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks:
      - frontend
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"
    environment:
      CHECKIN_DOMAIN: ${CHECKIN_DOMAIN:?set CHECKIN_DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          memory: 128M

  # --- Backups (write to ./backups on the host so they're easy to find & copy off-box) ---

  # Daily, consistent pg_dump with rotation. Restore:
  #   gunzip -c ./backups/db/last/checkin-<ts>.sql.gz | \
  #     docker compose exec -T db psql -U checkin -d checkin
  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-checkin}
      POSTGRES_USER: ${POSTGRES_USER:-checkin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "7"
      BACKUP_KEEP_WEEKS: "4"
      BACKUP_KEEP_MONTHS: "6"
    volumes:
      - ./backups/db:/backups
    deploy:
      resources:
        limits:
          memory: 128M

  # Nightly tar.gz of the uploaded media volume, kept 30 days. Restore: extract a
  # ./backups/media/*.tar.gz back into the media_data volume.
  media-backup:
    image: offen/docker-volume-backup:v2
    restart: unless-stopped
    environment:
      BACKUP_CRON_EXPRESSION: "0 3 * * *"
      BACKUP_FILENAME: "media-%Y-%m-%dT%H-%M-%S.tar.gz"
      BACKUP_RETENTION_DAYS: "30"
    volumes:
      - media_data:/backup/media:ro
      - ./backups/media:/archive
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  db_data:
  media_data:
  caddy_data:
  caddy_config:
